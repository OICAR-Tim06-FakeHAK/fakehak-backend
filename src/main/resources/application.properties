spring.application.name=fakehak

spring.config.import=optional:file:.env[.properties]

# Server
server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:mem:fakehak}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
# The secret should be provided via the JWT_SECRET environment variable or the .env file.
# A local development fallback is provided so the app can run without a .env file.
jwt.secret=${JWT_SECRET:fakehak-local-development-secret-change-this-before-deploying}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html